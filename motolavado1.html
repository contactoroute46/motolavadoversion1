                                    {!editAdminPayment && (<div className="mt-2 flex items-center gap-1 text-green-600 text-xs font-bold"><Icon name="CheckCircle" className="w-3 h-3" /> Guardado</div>)}{editAdminPayment && (<p className="text-[10px] text-indigo-400 mt-1">* Se restará de la ganancia si marcas "Sí".</p>)}
                                </div>
                            </div>
                        )}

                        {/* PESTAÑA CIERRE */}
                        {vistaActual === 'cierre' && (
                            <div className="space-y-6 fade-in">
                                <div className="text-center">
                                    <h2 className="text-2xl font-bold text-teal-800">Balance del Día</h2>
                                    <p className="text-sm text-slate-500">{new Date().toLocaleDateString()}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-blue-500">
                                        <p className="text-[10px] text-slate-400 uppercase font-bold">Venta Total</p>
                                        <p className="text-lg font-bold text-slate-800">{formatMoney(statsCierre.totalProduccion)}</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-green-500">
                                        <p className="text-[10px] text-slate-400 uppercase font-bold">Recaudo Físico Real</p>
                                        <p className="text-lg font-bold text-green-600">{formatMoney(statsCierre.totalRecaudo)}</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-red-500">
                                        <p className="text-[10px] text-slate-400 uppercase font-bold">Nómina Total</p>
                                        <p className="text-lg font-bold text-red-500">{formatMoney(statsCierre.totalNomina)}</p>
                                    </div>
                                    <div className="bg-teal-50 p-4 rounded-xl shadow-sm border border-teal-100">
                                        <p className="text-[10px] text-teal-600 uppercase font-bold">Ganancia Neta (Caja)</p>
                                        <p className="text-lg font-bold text-teal-700">{formatMoney(statsCierre.gananciaDia)}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-purple-50 p-4 rounded-xl shadow-sm border border-purple-100 flex justify-between items-center">
                                        <div><p className="text-[10px] text-purple-600 uppercase font-bold">Suscripciones (Hoy)</p><p className="text-lg font-bold text-purple-700">{formatMoney(statsCierre.recaudoSuscripciones)}</p></div><Icon name="Calendar" className="w-6 h-6 text-purple-300" />
                                    </div>
                                    <div className="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-100 flex justify-between items-center">
                                        <div><p className="text-[10px] text-blue-600 uppercase font-bold">Motos Día</p><p className="text-lg font-bold text-blue-700">{statsCierre.cantidadMotos}</p></div><Icon name="Bike" className="w-6 h-6 text-blue-300" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-red-50 p-4 rounded-xl shadow-sm border border-red-100 flex justify-between items-center">
                                        <div><p className="text-[10px] text-red-600 uppercase font-bold">Gastos (Hoy)</p><p className="text-lg font-bold text-red-700">{formatMoney(statsCierre.totalGastos)}</p></div><Icon name="Wallet" className="w-6 h-6 text-red-300" />
                                    </div>
                                    <div className="bg-indigo-50 p-4 rounded-xl shadow-sm border border-indigo-100 flex justify-between items-center">
                                        <div><p className="text-[10px] text-indigo-600 uppercase font-bold">Pago Admin</p><p className="text-lg font-bold text-indigo-700">{formatMoney(statsCierre.pagoAdminValue)}</p></div><Icon name="Briefcase" className="w-6 h-6 text-indigo-300" />
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl shadow-md overflow-hidden">
                                    <div className="bg-slate-50 px-4 py-3 border-b border-slate-100"><h3 className="font-bold text-slate-700 text-sm">Dinero en Caja y Bancos</h3></div>
                                    <div className="divide-y divide-slate-100">
                                        {Object.entries(statsCierre.metodos).map(([metodo, valor]) => (
                                            <div key={metodo} className="flex justify-between items-center px-4 py-3"><span className="text-sm text-slate-600 font-medium">{metodo}</span><span className="text-sm font-bold text-slate-800">{formatMoney(valor)}</span></div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl shadow-md overflow-hidden">
                                    <div className="bg-slate-50 px-4 py-3 border-b border-slate-100"><h3 className="font-bold text-slate-700 text-sm">Pago a Lavadores (Hoy)</h3></div>
                                    <div className="divide-y divide-slate-100">
                                        {statsLavadores.map((stat, idx) => (stat.cantidad > 0 && (
                                            <div key={idx} className="flex justify-between items-center px-4 py-3">
                                                <div><p className="font-bold text-slate-800 text-sm">{stat.nombre}</p><p className="text-[10px] text-slate-400">Prod: {formatMoney(stat.total)}</p></div>
                                                <div className="text-right"><span className="block text-sm font-bold text-red-500">{formatMoney(stat.pago)}</span><span className="text-[9px] text-slate-400">A PAGAR</span></div>
                                            </div>
                                        )))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* LISTADO DE ESPERA / EN LAVADO */}
                        {(vistaActual === 'proceso' || vistaActual === 'finalizados') && (
                            <div className="fade-in space-y-4">
                                {vistaActual === 'proceso' && (
                                    <div className="bg-white p-4 rounded-2xl shadow-md">
                                        <h2 className="text-sm font-bold mb-3 flex items-center gap-2 text-slate-700"><Icon name="Plus" className="w-4 h-4 text-blue-600" /> Agregar a Lista de Espera</h2>
                                        <form onSubmit={handleAdd} className="space-y-3">
                                            <div className="grid grid-cols-2 gap-3">
                                                <div><label className="text-[10px] font-bold text-slate-400">PLACA</label><input type="text" name="placa" value={form.placa} onChange={handleChange} className="w-full p-2 bg-slate-50 border rounded-lg font-mono font-bold uppercase text-sm" maxLength={7} placeholder="AAA-12A" /></div>
                                                <div><label className="text-[10px] font-bold text-slate-400">VALOR</label><input type="number" name="valor" value={form.valor} onChange={handleChange} className="w-full p-2 bg-slate-50 border rounded-lg font-bold text-sm" placeholder="$" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 items-center">
                                                <div>
                                                    <label className="text-[10px] font-bold text-slate-400">MÉTODO PAGO</label>
                                                    <select name="metodo" value={form.metodo} onChange={handleChange} className="w-full p-2 bg-slate-50 border rounded-lg text-sm font-bold text-slate-700">
                                                        <option value="DEBE">DEBE (Pendiente)</option>
                                                        <option value="Efectivo">Efectivo</option>
                                                        <option value="Nequi">Nequi</option>
                                                        <option value="Daviplata">Daviplata</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="mt-2">
                                                <input type="text" value={form.observaciones} onChange={(e) => setForm({...form, observaciones: e.target.value})} className="w-full p-2 bg-slate-50 border rounded-lg text-xs" placeholder="Observaciones (opcional)" />
                                            </div>
                                            <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-lg shadow-md font-bold flex justify-center items-center gap-2"><Icon name="Plus" className="w-5 h-5" /> Agregar Moto</button>
                                        </form>
                                    </div>
                                )}
                                
                                <div className="flex justify-between items-center gap-2">
                                    <div className="relative flex-1">
                                        <div className="absolute left-3 top-2.5 text-slate-400"><Icon name="Search" className="w-4 h-4" /></div>
                                        <input type="text" placeholder="Buscar..." value={busqueda} onChange={(e) => setBusqueda(e.target.value)} className="w-full pl-9 pr-3 py-2 bg-white rounded-lg border text-sm" />
                                    </div>
                                    {vistaActual === 'finalizados' && (
                                        <div className="bg-red-50 px-3 py-2 rounded-lg border border-red-100 text-right">
                                            <p className="text-[10px] text-red-400 font-bold uppercase">Deudores</p>
                                            <p className="text-sm font-bold text-red-600">{formatMoney(resumen.dineroPendiente)}</p>
                                        </div>
                                    )}
                                </div>

                                {vistaActual === 'finalizados' && <h3 className="text-xs font-bold text-slate-500 uppercase mt-2">Vehículos en Proceso</h3>}
                                
                                <div className="space-y-2">
                                    {registrosFiltrados.map((reg, index) => (
                                        <div key={reg.id} className={`relative p-2.5 rounded-lg shadow-sm bg-white flex justify-between items-center ${reg.eliminado ? 'opacity-60 grayscale bg-slate-50' : (vistaActual === 'proceso' ? 'border-l-4 border-l-blue-400' : (reg.pagado ? 'border-l-4 border-l-green-500' : 'border-l-4 border-l-red-500'))}`}>
                                            {vistaActual === 'proceso' && !reg.eliminado && (
                                                <div className="absolute -left-2 -top-1 w-5 h-5 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-[10px] shadow-md border border-slate-100 z-10">{registrosFiltrados.indexOf(reg) + 1}</div>
                                            )}
                                            <div className="flex-1 min-w-0 pr-1">
                                                <div className="flex items-center flex-wrap gap-x-2 gap-y-0.5">
                                                    <span className={`font-mono font-bold text-base ${reg.eliminado ? 'text-gray-400 line-through' : 'text-slate-800'}`}>{reg.placa}</span>
                                                    {!reg.pagado && !reg.eliminado && (
                                                        <button onClick={() => setModalPagoId(reg.id)} className="p-1 rounded bg-red-100 text-red-600 text-[10px] font-bold border border-red-200">NO PAGO</button>
                                                    )}
                                                    {reg.pagado && !reg.eliminado && (
                                                        <button onClick={() => openEditMetodo(reg)} className={`text-[10px] px-1.5 py-0.5 rounded font-bold border uppercase ${getPaymentStyle(reg.metodo)}`}>{reg.metodo}</button>
                                                    )}
                                                    <button onClick={() => !reg.eliminado && openEditPrecio(reg)} className={`font-bold text-sm ${reg.eliminado ? 'text-gray-400 cursor-default' : 'text-slate-700 underline decoration-dotted ml-1'}`}>{reg.eliminado ? '$0' : formatMoney(reg.valor)}</button>
                                                </div>
                                                
                                                {reg.observaciones && (
                                                    <div className={`text-xs italic px-1 rounded mt-0.5 mb-0.5 inline-block border ${reg.eliminado ? 'text-slate-400 bg-slate-100 border-slate-200' : 'text-orange-600 bg-orange-50 border-orange-100'}`}>
                                                        <Icon name="Pencil" className="w-3 h-3 inline mr-1" />{reg.observaciones}
                                                    </div>
                                                )}

                                                <div className="text-[10px] text-slate-400 flex items-center gap-2 mt-0.5">
                                                    <span className="flex items-center gap-1"><Icon name="Clock" className="w-3 h-3" /> {vistaActual === 'proceso' ? `Hace ${getTimeAgo(reg.fecha)}` : new Date(reg.fecha).toLocaleDateString()}</span>
                                                    {reg.lavador && <button onClick={() => !reg.eliminado && setModalLavadorId(reg.id)} className={`flex items-center gap-1 px-1.5 py-0.5 rounded ${reg.eliminado ? 'bg-transparent text-gray-400 cursor-default' : 'bg-purple-50 text-purple-600'}`} disabled={reg.eliminado}><Icon name="User" className="w-3 h-3" /> {reg.lavador}</button>}
                                                    {reg.eliminado && <span className="text-[9px] text-red-500 font-bold uppercase ml-2 bg-red-50 px-1 rounded">ANULADO</span>}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-1">
                                                <button onClick={() => !reg.eliminado && openObservacionModal(reg)} className={`p-1.5 rounded-full shadow-sm ${reg.eliminado ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-yellow-50 text-yellow-600 border border-yellow-100'}`} title="Nota"><Icon name="Pencil" className="w-5 h-5" /></button>
                                                
                                                {vistaActual === 'proceso' ? (
                                                    !reg.eliminado && <button onClick={() => setModalLavadorId(reg.id)} className="bg-blue-600 text-white px-2 py-1.5 rounded-lg text-[10px] font-bold shadow-sm flex items-center gap-1 active:scale-95">Pasar a Lavado <Icon name="ArrowRightCircle" className="w-3 h-3" /></button>
                                                ) : (
                                                    !reg.eliminado && (
                                                        <button onClick={() => validateAndSolicitFinish(reg)} className="bg-slate-800 text-white px-2 py-1.5 rounded-lg text-[10px] font-bold shadow-sm flex items-center gap-1 active:scale-95">Terminar <Icon name="Check" className="w-3 h-3" /></button>
                                                    )
                                                )}

                                                {!reg.eliminado ? (
                                                    <button type="button" onClick={() => setConfirmarAnularId(reg.id)} className="p-3 -mr-2 rounded-full text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors" title="Anular Registro"><Icon name="Trash2" className="w-5 h-5" /></button>
                                                ) : (
                                                    <button type="button" onClick={() => hardDeleteRegistro(reg.id)} className="p-3 -mr-2 rounded-full text-red-300 hover:text-red-600 hover:bg-red-50 transition-colors" title="Eliminar Definitivamente"><Icon name="X" className="w-5 h-5" /></button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {registrosFiltrados.length === 0 && <p className="text-center text-slate-400 text-xs py-8">No hay registros</p>}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODALES PRINCIPALES */}
                    {modalEditPrecio && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-4"><h3 className="text-xl font-bold text-slate-800">Editar Precio</h3></div>
                                <input type="number" value={modalEditPrecio.valor} onChange={(e) => setModalEditPrecio({...modalEditPrecio, valor: e.target.value})} className="w-full p-3 border rounded-xl text-lg font-bold mb-4 bg-slate-50 focus:bg-white text-center" />
                                <div className="flex gap-3">
                                    <button onClick={() => setModalEditPrecio(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold text-sm rounded-xl">Cancelar</button>
                                    <button onClick={savePrecio} className="flex-1 py-3 bg-green-600 text-white font-bold text-sm rounded-xl shadow-md">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Editar Metodo */}
                    {modalEditMetodo && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-4"><h3 className="text-xl font-bold text-slate-800">Cambiar Pago</h3></div>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    {['Efectivo', 'Nequi', 'Daviplata'].map(m => (
                                        <button key={m} onClick={() => saveMetodo(m)} className={`p-4 rounded-2xl border-2 font-bold uppercase hover:bg-slate-100 ${getPaymentStyle(m)}`}>{m}</button>
                                    ))}
                                </div>
                                <button onClick={() => setModalEditMetodo(null)} className="w-full py-3 text-slate-400 font-bold text-sm">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {/* Modal Terminar Servicio */}
                    {confirmarTerminarId && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Check" className="w-8 h-8 text-blue-600" /></div>
                                    <h3 className="text-xl font-bold text-slate-800">¿Terminar Servicio?</h3>
                                    <p className="text-slate-500 text-sm mt-2 px-2">La moto desaparecerá de la lista activa pero el dinero se mantendrá en el cierre.</p>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmarTerminarId(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold text-sm rounded-xl">Cancelar</button>
                                    <button onClick={confirmarTerminar} className="flex-1 py-3 bg-blue-600 text-white font-bold text-sm rounded-xl shadow-md">Sí, Terminar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Observacion */}
                    {modalObservacionId && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-4"><h3 className="text-xl font-bold text-slate-800">Nota / Observación</h3></div>
                                <textarea 
                                    value={tempObservacion} 
                                    onChange={(e) => setTempObservacion(e.target.value)} 
                                    className="w-full p-3 border rounded-xl text-sm mb-4 h-24 resize-none bg-slate-50 focus:bg-white transition-colors"
                                    placeholder="Escribe aquí (ej: Cuidado espejo derecho)..."
                                ></textarea>
                                <div className="flex gap-3">
                                    <button onClick={() => setModalObservacionId(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold text-sm rounded-xl">Cancelar</button>
                                    <button onClick={saveObservacion} className="flex-1 py-3 bg-yellow-500 text-white font-bold text-sm rounded-xl shadow-md">Guardar Nota</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Login Admin */}
                    {showPinModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-4"><h3 className="text-xl font-bold text-slate-800">Admin Login</h3></div>
                                <div className="space-y-4">
                                    <input type="password" value={pinInput} onChange={(e) => setPinInput(e.target.value)} className="w-full p-4 text-center text-2xl font-bold tracking-widest border-2 border-slate-200 rounded-xl" maxLength={4} inputMode="numeric" placeholder="PIN" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => setShowPinModal(false)} className="py-3 bg-slate-100 text-slate-500 font-bold rounded-xl">Cancelar</button>
                                        <button onClick={verifyPin} className="py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md">Ingresar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Anular */}
                    {confirmarAnularId && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-6"><div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Trash2" className="w-8 h-8 text-red-600" /></div><h3 className="text-xl font-bold text-slate-800">¿Anular Servicio?</h3><p className="text-slate-500 text-sm mt-2 px-2">El registro quedará marcado como <b>anulado</b> y su valor será $0.</p></div>
                                <div className="flex gap-3"><button onClick={() => setConfirmarAnularId(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold text-sm rounded-xl">Cancelar</button><button onClick={confirmarAnulacion} className="flex-1 py-3 bg-red-600 text-white font-bold text-sm rounded-xl shadow-md">Sí, Anular</button></div>
                            </div>
                        </div>
                    )}

                    {/* Modal Eliminar Gasto */}
                    {confirmarEliminarGastoId && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-6"><div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Trash2" className="w-8 h-8 text-red-600" /></div><h3 className="text-xl font-bold text-slate-800">¿Eliminar Gasto?</h3><p className="text-slate-500 text-sm mt-2 px-2">Se eliminará permanentemente.</p></div>
                                <div className="flex gap-3"><button onClick={() => setConfirmarEliminarGastoId(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold text-sm rounded-xl">Cancelar</button><button onClick={confirmarEliminacionGasto} className="flex-1 py-3 bg-red-600 text-white font-bold text-sm rounded-xl shadow-md">Sí, Eliminar</button></div>
                            </div>
                        </div>
                    )}

                    {/* Modal Asignar Lavador */}
                    {modalLavadorId && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-6"><h3 className="text-xl font-bold text-slate-800">Asignar Lavador</h3></div>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    {lavadores.map((name, idx) => (<button key={idx} onClick={() => confirmarFinalizacion(name)} className="p-4 rounded-2xl bg-slate-50 border-2 font-bold text-slate-600 active:scale-95">{name}</button>))}
                                </div>
                                <button onClick={() => setModalLavadorId(null)} className="w-full py-3 text-slate-400 font-bold text-sm">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {/* Modal Confirmar Pago (NO PAGO a Pagado) */}
                    {modalPagoId && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-6"><h3 className="text-xl font-bold text-slate-800">Confirmar Pago</h3></div>
                                {errorMsg && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm font-bold text-center border border-red-200">{errorMsg}</div>}
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    {['Efectivo', 'Nequi', 'Daviplata', 'Suscripción'].map(m => { 
                                        const r = registros.find(r => r.id === modalPagoId); 
                                        let dis = m === 'Suscripción' ? r?.valor > 0 : r?.valor === 0; 
                                        return (<button key={m} onClick={() => confirmarPago(m)} className={`p-4 rounded-2xl border-2 font-bold transition-all active:scale-95 ${dis ? 'bg-slate-100 text-slate-300 opacity-60' : 'bg-slate-50 text-slate-600'}`}>{m}</button>); 
                                    })}
                                </div>
                                <button onClick={() => setModalPagoId(null)} className="w-full py-3 text-slate-400 font-bold text-sm">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {/* Modal Detalle Lavador */}
                    {modalDetalleLavador && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col max-h-[80vh]">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-xl font-bold text-slate-800">{modalDetalleLavador}</h3>
                                    <button onClick={() => setModalDetalleLavador(null)}><Icon name="X" className="w-6 h-6 text-slate-400" /></button>
                                </div>
                                <div className="overflow-y-auto flex-1 space-y-0 border-t border-b border-slate-100 py-2">
                                    {registros.filter(r => r.terminado && r.lavador === modalDetalleLavador && !r.eliminado).map(r => { 
                                        const sub = r.metodo === 'Suscripción' ? mensualidades.find(m => m.placa === r.placa) : null; 
                                        return (
                                            <div key={r.id} className="flex justify-between items-center py-2 px-1 border-b border-slate-50 last:border-0 text-sm">
                                                <div className="flex items-center gap-2">
                                                    <span className="font-mono font-bold text-slate-700">{r.placa}</span>
                                                    <span className="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500">{r.metodo} {sub ? `(${sub.tipo})` : ''}</span>
                                                </div>
                                                <span className="font-medium text-slate-600">{formatMoney(r.valor)}</span>
                                            </div>
                                        ) 
                                    })}
                                </div>
                                <button onClick={() => setModalDetalleLavador(null)} className="w-full py-3 mt-2 bg-slate-800 text-white font-bold text-sm rounded-xl">Cerrar</button>
                            </div>
                        </div>
                    )}

                    {/* Modal Calendario Descanso */}
                    {selectedDay && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col">
                                <div className="text-center mb-6"><h3 className="text-xl font-bold text-slate-800">Descanso</h3><p className="text-slate-500 text-sm">{selectedDay}</p></div>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    {lavadores.map((name, idx) => { 
                                        const cs = getWasherColorStyle(idx); 
                                        const isSel = descansos[selectedDay] === name; 
                                        return (<button key={idx} onClick={() => handleAssignDescanso(name)} className={`p-3 rounded-xl border-2 font-bold text-sm ${isSel ? `${cs.bg} ${cs.text}` : 'bg-white text-slate-500'}`}>{name}</button>); 
                                    })}
                                </div>
                                <button onClick={() => handleAssignDescanso(null)} className="w-full py-3 text-red-500 font-bold text-sm mb-2 border border-red-100 rounded-xl">Borrar</button>
                                <button onClick={() => setSelectedDay(null)} className="w-full py-3 text-slate-400 font-bold text-sm">Cerrar</button>
                            </div>
                        </div>
                    )}

                    {/* Modal Editar Suscripcion */}
                    {editMensualidad && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col max-h-[90vh] overflow-y-auto">
                                <div className="text-center mb-4"><h3 className="text-xl font-bold text-slate-800">Editar Suscripción</h3></div>
                                <div className="space-y-3">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-bold text-slate-400">NOMBRE</label><input type="text" value={editMensualidad.nombre} onChange={(e) => setEditMensualidad({...editMensualidad, nombre: e.target.value})} className="w-full p-2 bg-slate-50 border rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400">CELULAR</label><input type="number" value={editMensualidad.telefono} onChange={(e) => setEditMensualidad({...editMensualidad, telefono: e.target.value})} className="w-full p-2 bg-slate-50 border rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-bold text-slate-400">PLACA</label><input type="text" value={editMensualidad.placa} onChange={(e) => setEditMensualidad({...editMensualidad, placa: e.target.value.toUpperCase()})} className="w-full p-2 bg-slate-50 border rounded-lg font-mono font-bold uppercase text-sm" maxLength={7} /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400">MOTO (MARCA)</label><input type="text" value={editMensualidad.moto} onChange={(e) => setEditMensualidad({...editMensualidad, moto: e.target.value})} className="w-full p-2 bg-slate-50 border rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-bold text-slate-400">TIPO</label><select value={editMensualidad.tipo} onChange={(e) => setEditMensualidad({...editMensualidad, tipo: e.target.value})} className="w-full p-2 bg-slate-50 border rounded-lg text-sm"><option value="Básica">Básica</option><option value="Completa">Completa</option><option value="Full">Full</option></select></div>
                                        <div><label className="text-[10px] font-bold text-slate-400">INICIO</label><input type="date" value={editMensualidad.fechaInicioInput} onChange={(e) => setEditMensualidad({...editMensualidad, fechaInicioInput: e.target.value})} className="w-full p-2 bg-slate-50 border rounded-lg text-sm"/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-bold text-slate-400">VALOR</label><input type="number" value={editMensualidad.valor} onChange={(e) => setEditMensualidad({...editMensualidad, valor: Number(e.target.value)})} className="w-full p-2 bg-slate-100 border rounded-lg text-sm"/></div>
                                        <div><label className="text-[10px] font-bold text-slate-400">PAGO</label><select value={editMensualidad.metodoPago} onChange={(e) => setEditMensualidad({...editMensualidad, metodoPago: e.target.value})} className="w-full p-2 bg-slate-50 border rounded-lg text-sm"><option value="Efectivo">Efectivo</option><option value="Nequi">Nequi</option><option value="Daviplata">Daviplata</option></select></div>
                                    </div>
                                </div>
                                <div className="flex gap-2 mt-4">
                                    <button onClick={() => setEditMensualidad(null)} className="flex-1 py-3 text-slate-500 font-bold text-sm bg-slate-100 rounded-xl">Cancelar</button>
                                    <button onClick={handleSaveEditMensualidad} className="flex-1 py-3 bg-purple-600 text-white font-bold text-sm rounded-xl shadow-md">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```
